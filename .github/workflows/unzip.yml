name: Step by Step Unzip NFT Images

on:
  workflow_dispatch:

jobs:
  unzip-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Images Directory
        run: mkdir -p images

      - name: Process and Push Each Zip Sequentially
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          for i in {1..11}; do
            file="part${i}.zip"
            if [ -f "$file" ]; then
              echo "----------------------------------------"
              echo "Processing: $file"
              echo "----------------------------------------"
              
              # Unzip without deleting the source zip file
              unzip -q -o "$file" -d images/
              
              # Add only the images directory to git
              git add images/
              
              if ! git diff-index --quiet HEAD --; then
                git commit -m "Add images from $file"
                git pull origin main --rebase
                git push origin main
                echo "Successfully processed and pushed images from $file"
              else
                echo "No new images detected or already processed for $file"
              fi
            fi
          done
