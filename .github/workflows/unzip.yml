name: Ultimate Flatten Unzip NFT Images

on:
  workflow_dispatch:

jobs:
  unzip-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git and Create Clean Target Directory
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          rm -rf images
          mkdir -p images

      - name: Extract All Images Directly Into Target Directory
        run: |
          shopt -s nullglob
          for file in part*.zip; do
            if [ -f "$file" ]; then
              echo "Processing $file..."
              # Create a temporary directory for safe extraction
              mkdir -p temp_extract
              unzip -q -o "$file" -d temp_extract/
              
              # Find all png files inside subfolders and move them directly to images/
              find temp_extract/ -type f -name "*.png" -exec mv -f {} images/ \;
              find temp_extract/ -type f -name "*.PNG" -exec mv -f {} images/ \;
              
              # Clean temporary directory
              rm -rf temp_extract
            fi
          done

      - name: Commit and Push Flattened Images
        run: |
          git add images/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Add and flatten all NFT images directly to images folder"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes detected"
          fi
