name: Manual Step Unzip NFT Images

on:
  workflow_dispatch:

jobs:
  unzip-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p images

      - name: Process Part 1
        if: always()
        run: |
          if [ -f "part1.zip" ]; then
            unzip -q -o "part1.zip" -d images/
            git add images/
            git diff-index --quiet HEAD -- || (git commit -m "Add part1" && git pull origin main --rebase && git push origin main)
          fi

      - name: Process Part 2
        if: always()
        run: |
          if [ -f "part2.zip" ]; then
