name: Unzip NFT Images

on:
  workflow_dispatch:

jobs:
  unzip-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Images Directory
        run: mkdir -p images

      - name: Find and Unzip All Parts
        run: |
          shopt -s nullglob
          for file in [Pp]art*.zip; do
            if [ -f "$file" ]; then
              echo "Processing $file..."
              unzip -q -o "$file" -d images/
            fi
          done

      - name: Clean Up Zip Files
        run: |
          shopt -s nullglob
          rm -f [Pp]art*.zip

      - name: Commit and Push Unzipped Images
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add images/
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Add unzipped NFT images via GitHub Actions"
            git push origin main
          fi
